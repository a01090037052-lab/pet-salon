<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫살롱 - 애견 미용 고객 관리</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:">
  <meta name="description" content="애견 미용 샵 고객 관리 시스템">
  <meta name="theme-color" content="#6366F1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="펫살롱">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <div class="text">펫살롱 로딩 중...</div>
    </div>
  </div>

  <!-- Sidebar -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">&#x2702; 펫살롱</h1>
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="메뉴 접기">&#9776;</button>
    </div>
    <ul class="nav-menu">
      <li><a href="#dashboard" class="nav-link active" data-page="dashboard" data-tooltip="대시보드">
        <span class="nav-icon">&#x1F3E0;</span><span class="nav-text">대시보드</span>
      </a></li>
      <li><a href="#customers" class="nav-link" data-page="customers" data-tooltip="고객 관리">
        <span class="nav-icon">&#x1F464;</span><span class="nav-text">고객 관리</span>
      </a></li>
      <li><a href="#pets" class="nav-link" data-page="pets" data-tooltip="반려견 관리">
        <span class="nav-icon">&#x1F436;</span><span class="nav-text">반려견 관리</span>
      </a></li>
      <li><a href="#appointments" class="nav-link" data-page="appointments" data-tooltip="예약 관리">
        <span class="nav-icon">&#x1F4C5;</span><span class="nav-text">예약 관리</span>
        <span class="nav-badge" id="badge-appointments" style="display:none">0</span>
      </a></li>
      <li><a href="#records" class="nav-link" data-page="records" data-tooltip="미용 기록">
        <span class="nav-icon">&#x2702;</span><span class="nav-text">미용 기록</span>
      </a></li>
      <li><a href="#revenue" class="nav-link" data-page="revenue" data-tooltip="매출">
        <span class="nav-icon">&#x1F4B0;</span><span class="nav-text">매출</span>
      </a></li>
      <li><a href="#analytics" class="nav-link" data-page="analytics" data-tooltip="분석">
        <span class="nav-icon">&#x1F4CA;</span><span class="nav-text">분석</span>
      </a></li>
      <li><a href="#services" class="nav-link" data-page="services" data-tooltip="서비스 메뉴">
        <span class="nav-icon">&#x1F4CB;</span><span class="nav-text">서비스 메뉴</span>
      </a></li>
      <li><a href="#settings" class="nav-link" data-page="settings" data-tooltip="설정">
        <span class="nav-icon">&#x2699;</span><span class="nav-text">설정</span>
      </a></li>
    </ul>
    <div class="sidebar-footer">v1.1 (0401) &middot; 오프라인 전용</div>
  </nav>

  <!-- Main Content -->
  <main id="main-content" class="main-content">
    <div id="page-content" class="page-content">
    </div>
  </main>

  <!-- Global Search Button -->
  <button id="global-search-btn" class="global-search-btn" title="고객 검색 (/)" aria-label="고객 검색">&#x1F50D;</button>

  <!-- Global Search Overlay -->
  <div id="global-search-overlay" class="global-search-overlay hidden">
    <div class="global-search-container">
      <div class="global-search-header">
        <div class="global-search-input-wrap">
          <span class="global-search-icon">&#x1F50D;</span>
          <input type="text" id="global-search-input" class="global-search-input"
            placeholder="고객 이름, 반려견 이름, 전화번호 검색..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button id="global-search-close" class="global-search-close">&times;</button>
        </div>
        <div class="global-search-hint">고객 이름, 반려견 이름 또는 전화번호 뒷자리로 빠르게 검색</div>
      </div>
      <div id="global-search-results" class="global-search-results"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer">
        <button id="modal-cancel" class="btn btn-secondary">취소</button>
        <button id="modal-save" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="modal-overlay hidden" role="alertdialog" aria-modal="true">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <h2>확인</h2>
      </div>
      <div id="confirm-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="confirm-cancel" class="btn btn-secondary">취소</button>
        <button id="confirm-ok" class="btn btn-danger">확인</button>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav">
    <a href="#dashboard" class="bottom-nav-item active" data-page="dashboard">
      <span class="bottom-nav-icon">&#x1F3E0;</span><span class="bottom-nav-label">홈</span>
    </a>
    <a href="#pets" class="bottom-nav-item" data-page="pets">
      <span class="bottom-nav-icon">&#x1F436;</span><span class="bottom-nav-label">반려견</span>
    </a>
    <a href="#appointments" class="bottom-nav-item" data-page="appointments">
      <span class="bottom-nav-icon">&#x1F4C5;</span>
      <span class="bottom-nav-badge" id="bottom-badge" style="display:none">0</span>
      <span class="bottom-nav-label">예약</span>
    </a>
    <div class="bottom-nav-add" id="bottom-nav-add" role="button" aria-label="빠른 추가" aria-haspopup="true">
      <span>+</span>
      <div class="bottom-add-menu" id="bottom-nav-add-menu">
        <div class="bottom-add-item" data-action="customer">&#x1F464; 새 고객</div>
        <div class="bottom-add-item" data-action="pet">&#x1F436; 새 반려견</div>
        <div class="bottom-add-item" data-action="appointment">&#x1F4C5; 새 예약</div>
        <div class="bottom-add-item" data-action="record">&#x2702; 새 미용기록</div>
      </div>
    </div>
    <a href="#records" class="bottom-nav-item" data-page="records">
      <span class="bottom-nav-icon">&#x2702;</span><span class="bottom-nav-label">기록</span>
    </a>
    <a href="#revenue" class="bottom-nav-item" data-page="revenue">
      <span class="bottom-nav-icon">&#x1F4B0;</span><span class="bottom-nav-label">매출</span>
    </a>
    <div class="bottom-nav-item" id="bottom-more-btn">
      <span class="bottom-nav-icon">&#x2022;&#x2022;&#x2022;</span><span class="bottom-nav-label">더보기</span>
      <div class="bottom-more-menu" id="bottom-more-menu">
        <a href="#customers" class="bottom-more-item">&#x1F464; 고객 관리</a>
        <a href="#analytics" class="bottom-more-item">&#x1F4CA; 분석</a>
        <a href="#services" class="bottom-more-item">&#x1F4CB; 서비스 메뉴</a>
        <a href="#settings" class="bottom-more-item">&#x2699; 설정</a>
      </div>
    </div>
  </nav>

  <!-- Photo Lightbox -->
  <div id="photo-lightbox" class="photo-lightbox hidden">
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <img id="lightbox-img" class="lightbox-img" src="" alt="">
      <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>
    <div class="lightbox-nav">
      <button class="lightbox-prev" id="lightbox-prev">&#x276E;</button>
      <button class="lightbox-next" id="lightbox-next">&#x276F;</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/customers.js"></script>
  <script src="js/pages/pets.js"></script>
  <script src="js/pages/appointments.js"></script>
  <script src="js/pages/records.js"></script>
  <script src="js/pages/revenue.js"></script>
  <script src="js/pages/services.js"></script>
  <script src="js/pages/analytics.js"></script>
  <script src="js/pages/settings.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
