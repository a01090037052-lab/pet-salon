<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- ===== SCISSORS ===== -->
  <g transform="translate(256, 256) rotate(-25)">

    <!-- Upper blade (날이 곡선으로 만나는 진짜 가위 형태) -->
    <!-- 날: 피벗에서 시작, 바깥으로 넓어졌다가 끝에서 뾰족하게 모임 -->
    <path d="
      M 5 -6
      C 30 -12, 80 -30, 130 -52
      C 145 -58, 155 -52, 150 -44
      C 140 -36, 90 -20, 5 -2
      Z
    " fill="white"/>
    <!-- 날 등 (두께감) -->
    <path d="
      M 5 -6
      C 30 -14, 80 -34, 130 -56
    " fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

    <!-- Lower blade (위 날과 교차) -->
    <path d="
      M 5 6
      C 30 12, 80 30, 130 52
      C 145 58, 155 52, 150 44
      C 140 36, 90 20, 5 2
      Z
    " fill="white"/>
    <path d="
      M 5 6
      C 30 14, 80 34, 130 56
    " fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

    <!-- Upper handle arm (날에서 손잡이로 연결) -->
    <path d="M -5 -6 L -30 -28" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <!-- Upper finger ring -->
    <circle cx="-62" cy="-58" r="44" fill="none" stroke="white" stroke-width="18"/>

    <!-- Lower handle arm -->
    <path d="M -5 6 L -30 28" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <!-- Lower finger ring -->
    <circle cx="-62" cy="58" r="44" fill="none" stroke="white" stroke-width="18"/>

    <!-- Pivot screw -->
    <circle cx="0" cy="0" r="13" fill="white"/>
    <circle cx="0" cy="0" r="5.5" fill="url(#bg)" opacity="0.5"/>

  </g>
</svg>
